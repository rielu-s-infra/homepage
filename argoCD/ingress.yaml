apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site2-frontend
  namespace: rielu-site2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # ここには絶対に rewrite-target を入れない
spec:
  ingressClassName: nginx
  rules:
    - host: rielu.uniproject.jp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-site2-service
                port:
                  number: 3000
  tls:
    - hosts:
        - rielu.uniproject.jp
      secretName: rielu-uniproject-jp-tls