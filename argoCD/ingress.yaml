apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site2-ingress
  namespace: rielu-site2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # 以下の2行を追加
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: rielu.uniproject.jp
      http:
        paths:
          # Uptime Kuma へのルーティング
          - path: /api-kuma(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: uptime-kuma-service # 実際の Kuma の Service 名に書き換えてください
                port:
                  number: 3001 # Kuma のポート
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-site2-service
                port:
                  number: 3000
  tls:
    - hosts:
        - rielu.uniproject.jp
      secretName: rielu-uniproject-jp-tls
