apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site2-combined-ingress
  namespace: rielu-site2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # ここには rewrite-target を書かない（グローバルに適用されるのを防ぐ）
spec:
  ingressClassName: nginx
  rules:
    - host: rielu.uniproject.jp
      http:
        paths:
          # フロントエンド（rewriteなし：/assets/xxx がそのまま届く）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-site2-service
                port:
                  number: 3000
  tls:
    - hosts:
        - rielu.uniproject.jp
      secretName: rielu-uniproject-jp-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site2-api-ingress
  namespace: rielu-site2
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: rielu.uniproject.jp
      http:
        paths:
          # API（ここだけ rewrite あり）
          - path: /api-kuma(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: uptime-kuma-service
                port:
                  number: 80