apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site2-ingress
  namespace: rielu-site2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # パス書き換えのための重要設定
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: rielu.uniproject.jp
      http:
        paths:
          # Uptime Kuma へのルーティング
          - path: /api-kuma(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: uptime-kuma-service
                port:
                  number: 3001
          # フロントエンド（Vite/Bun）へのルーティング
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-site2-service
                port:
                  number: 3000
  tls:
    - hosts:
        - rielu.uniproject.jp
      secretName: rielu-uniproject-jp-tls